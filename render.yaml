services:
  - type: web
    name: xianghui-portrait
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend_formal:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
